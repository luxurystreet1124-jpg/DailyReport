services:
  - type: web
    name: dailyreport
    runtime: docker
    plan: free
    healthCheckPath: /login
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: DB_PATH
        value: /app/data/daily_report.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: ATLASSIAN_CLIENT_ID
        sync: false
      - key: ATLASSIAN_CLIENT_SECRET
        sync: false
    disk:
      name: dailyreport-data
      mountPath: /app/data
      sizeGB: 1
