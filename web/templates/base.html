<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DailyReport{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% block nav %}
    {% if user %}
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard" class="text-xl font-bold text-indigo-600">DailyReport</a>
                    <a href="/dashboard" class="text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium
                        {% if active_page == 'dashboard' %}text-indigo-600 border-b-2 border-indigo-600{% endif %}">
                        ダッシュボード
                    </a>
                    <a href="/settings" class="text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium
                        {% if active_page == 'settings' %}text-indigo-600 border-b-2 border-indigo-600{% endif %}">
                        設定
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">{{ user.display_name }}</span>
                    <a href="/logout" class="text-sm text-red-600 hover:text-red-700">ログアウト</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}
    {% endblock %}

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% if flash_message %}
        <div class="mb-6 p-4 rounded-lg
            {% if flash_type == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif flash_type == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ flash_message }}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
